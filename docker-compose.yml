version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-assessment
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: assessmentdb
      MYSQL_USER: vruser
      MYSQL_PASSWORD: vrpass
    expose:
      - "3306"
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: api-assessment
    ports:
      # Mapear porta alternativa no host para evitar conflito com execução local (host:container)
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/assessmentdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vruser
      - SPRING_DATASOURCE_PASSWORD=vrpass
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SERVER_PORT=8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
