version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-assessment
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: assessmentdb
      MYSQL_USER: vruser
      MYSQL_PASSWORD: vrpass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d

  app:
    build: .
    container_name: api-assessment
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/assessmentdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vruser
      - SPRING_DATASOURCE_PASSWORD=vrpass
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SERVER_PORT=8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:

